name: Run Naukri Auto-Update

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'  # ⏱️ Every 5 minutes

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Install Google Chrome & dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip \
            libxss1 libappindicator3-1 libindicator7 libnss3 \
            libatk-bridge2.0-0 libgtk-3-0 libasound2 libgbm1
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get install -f -y
          google-chrome --version

      - name: Run Naukri update script
        env:
          NAUKRI_EMAIL: ${{ secrets.NAUKRI_EMAIL }}
          NAUKRI_PASSWORD: ${{ secrets.NAUKRI_PASSWORD }}
          RESUME_PATH: satya_cloud.pdf
        run: python naukri_update.py
